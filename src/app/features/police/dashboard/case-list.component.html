<ds-page-header title="Cases" accent="police">
  <button
    dsHeaderAction
    type="button"
    (click)="toggleFilters()"
    class="h-9 px-3 rounded-lg text-body font-medium text-neutral-600 hover:bg-neutral-100 transition-colors"
    [class.bg-neutral-100]="showFilters()"
  >
    Filter
  </button>
  <a
    dsHeaderAction
    routerLink="/logout"
    class="h-9 px-3 flex items-center rounded-lg text-body font-medium text-neutral-500 hover:bg-neutral-100 transition-colors"
  >
    Logout
  </a>
</ds-page-header>

<div class="max-w-lg mx-auto px-3 sm:px-4 pb-28">
  <!-- Single search box: matches on case number, FIR/external no., person name, vehicle number, district -->
  <div class="mt-4 relative">
    <span class="pointer-events-none absolute inset-y-0 left-3.5 flex items-center text-neutral-400">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
    </span>
    <input
      type="search"
      [formControl]="searchControl"
      placeholder="Search cases, persons, vehicles, address…"
      aria-label="Search cases"
      autocomplete="off"
      class="w-full h-11 pl-11 pr-10 rounded-full bg-neutral-100 border border-transparent
             text-body text-neutral-900 placeholder:text-neutral-400
             focus:bg-white focus:border-neutral-300 focus:outline-none focus:shadow-sm
             transition-colors"
    />
    @if (searchControl.value) {
      <button
        type="button"
        (click)="clearSearch()"
        aria-label="Clear search"
        class="absolute inset-y-0 right-2 my-auto w-7 h-7 flex items-center justify-center rounded-full text-neutral-400 hover:bg-neutral-200 hover:text-neutral-600 transition-colors"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    }
  </div>

  @if (showFilters()) {
    <div class="mt-3 rounded-xl border border-neutral-200 bg-white shadow-sm p-4">
      <ds-search-filter-bar [fields]="filterFields" (search)="applyFilters($event)" />
    </div>
  }

  @if (loading()) {
    <div class="mt-4 rounded-xl border border-neutral-200 bg-white overflow-hidden">
      <ds-skeleton-list />
    </div>
  } @else if (cases().length === 0) {
    @if (searchControl.value.trim()) {
      <ds-empty-state
        title="No results"
        [message]="'No cases match “' + searchControl.value.trim() + '”.'"
      >
        <ds-button label="Clear search" variant="secondary" [block]="false" (pressed)="clearSearch()" />
      </ds-empty-state>
    } @else {
      <ds-empty-state title="No cases yet" message="Open a case and add details as the investigation progresses.">
        <ds-button label="New case" variant="police" [block]="false" (pressed)="create()" />
      </ds-empty-state>
    }
  } @else {
    <div class="mt-4 rounded-xl border border-neutral-200 shadow-sm overflow-hidden divide-y divide-neutral-100">
      @for (c of cases(); track c.id; let i = $index) {
        <ds-list-item
          [index]="i"
          [title]="c.caseNumber + (c.caseNo ? ' · ' + c.caseNo : '')"
          [subtitle]="statusLabels[c.status]"
          [meta]="(c.caseDate | date: 'mediumDate') ?? ''"
          (selected)="open(c.id)"
        />
      }
    </div>
  }
</div>

<button
  type="button"
  (click)="create()"
  aria-label="New case"
  class="fixed bottom-5 right-5 w-14 h-14 rounded-full bg-police text-white shadow-lg
         flex items-center justify-center transition-transform active:scale-95 hover:shadow-xl"
>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
  </svg>
</button>
