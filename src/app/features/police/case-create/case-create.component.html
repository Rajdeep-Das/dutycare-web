<ds-page-header
  [title]="isEdit() ? 'Edit case' : 'New case'"
  accent="police"
  [back]="true"
  (backClick)="cancel()"
/>

<div class="max-w-lg mx-auto px-4 py-5">
  <form (ngSubmit)="save()" class="space-y-5" novalidate>
    <div>
      <label for="caseNo" class="block text-body font-medium text-neutral-700 mb-1.5">
        FIR / external number <span class="text-neutral-400 font-normal">(optional)</span>
      </label>
      <input dsInput id="caseNo" name="caseNo" type="text"
        [ngModel]="caseNo()" (ngModelChange)="caseNo.set($event)" />
      <p class="mt-1.5 text-caption text-neutral-500">The case number is generated automatically.</p>
    </div>

    <div>
      <label for="date" class="block text-body font-medium text-neutral-700 mb-1.5">Case date</label>
      <input dsInput id="date" name="date" type="date" required
        [ngModel]="caseDate()" (ngModelChange)="caseDate.set($event)" />
    </div>

    <div>
      <label for="status" class="block text-body font-medium text-neutral-700 mb-1.5">Status</label>
      <select dsInput id="status" name="status"
        [ngModel]="status()" (ngModelChange)="status.set($event)">
        <option value="Open">Open</option>
        <option value="UnderInvestigation">Under investigation</option>
        <option value="Closed">Closed</option>
      </select>
    </div>

    <div>
      <label for="desc" class="block text-body font-medium text-neutral-700 mb-1.5">
        Description <span class="text-neutral-400 font-normal">(optional)</span>
      </label>
      <textarea dsInput id="desc" name="desc" rows="4"
        [ngModel]="description()" (ngModelChange)="description.set($event)"></textarea>
    </div>

    @if (error()) {
      <p class="text-error text-body">{{ error() }}</p>
    }

    <ds-button
      type="submit"
      variant="police"
      [label]="isEdit() ? 'Save changes' : 'Create case'"
      loadingLabel="Saving…"
      [loading]="saving()"
      [disabled]="!caseDate()"
    />
  </form>
</div>
