<main class="min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-sm">
    <header class="text-center mb-8">
      <h1 class="font-semibold text-large-title">DutyCare</h1>
      <p class="mt-1 text-neutral-500">Sign in to continue</p>
    </header>

    <form (ngSubmit)="submit()" class="space-y-4" novalidate>
      <div>
        <label for="username" class="block mb-1 font-medium text-neutral-700">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          required
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
          class="w-full rounded-md border border-neutral-300 px-3 py-2.5 outline-none focus:border-primary focus:ring-2 focus:ring-primary-soft"
        />
      </div>

      <div>
        <label for="password" class="block mb-1 font-medium text-neutral-700">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          class="w-full rounded-md border border-neutral-300 px-3 py-2.5 outline-none focus:border-primary focus:ring-2 focus:ring-primary-soft"
        />
      </div>

      @if (error()) {
        <p class="text-error">{{ error() }}</p>
      }

      <ds-button
        type="submit"
        label="Sign in"
        loadingLabel="Signing in…"
        [loading]="loading()"
        [disabled]="!username() || !password()"
      />
    </form>
  </div>
</main>
