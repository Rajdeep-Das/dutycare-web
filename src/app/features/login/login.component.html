<main class="min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-sm">
    <header class="text-center mb-8">
      <h1 class="font-semibold" style="font-size: var(--text-large-title)">DutyCare</h1>
      <p class="mt-1 text-slate-500">Sign in to continue</p>
    </header>

    <form (ngSubmit)="submit()" class="space-y-4" novalidate>
      <div>
        <label for="username" class="block mb-1 font-medium text-slate-700">Username</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          required
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
          class="w-full rounded-lg border border-slate-300 px-3 py-2.5 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
        />
      </div>

      <div>
        <label for="password" class="block mb-1 font-medium text-slate-700">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          class="w-full rounded-lg border border-slate-300 px-3 py-2.5 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
        />
      </div>

      @if (error()) {
        <p class="text-sm" style="color: var(--error-500)">{{ error() }}</p>
      }

      <button
        type="submit"
        [disabled]="loading() || !username() || !password()"
        class="w-full rounded-lg py-2.5 font-medium text-white transition disabled:opacity-50"
        style="background: var(--primary-500)"
      >
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
  </div>
</main>
