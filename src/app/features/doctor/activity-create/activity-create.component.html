<div class="max-w-lg mx-auto px-4 py-4">
  <header class="flex items-center gap-3 mb-5">
    <button type="button" (click)="cancel()" class="text-neutral-600 text-2xl leading-none">←</button>
    <h1 class="text-title font-semibold text-doctor">New activity</h1>
  </header>

  <form (ngSubmit)="save()" class="space-y-4" novalidate>
    <div>
      <label for="name" class="block mb-1 font-medium text-neutral-700">Name</label>
      <input
        id="name"
        name="name"
        type="text"
        required
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
        class="w-full rounded-md border border-neutral-300 px-3 py-2.5 outline-none focus:border-doctor"
      />
    </div>

    <div>
      <label for="date" class="block mb-1 font-medium text-neutral-700">Date</label>
      <input
        id="date"
        name="date"
        type="date"
        required
        [ngModel]="activityDate()"
        (ngModelChange)="activityDate.set($event)"
        class="w-full rounded-md border border-neutral-300 px-3 py-2.5 outline-none focus:border-doctor"
      />
    </div>

    <div>
      <label for="place" class="block mb-1 font-medium text-neutral-700">Place</label>
      <input
        id="place"
        name="place"
        type="text"
        [ngModel]="place()"
        (ngModelChange)="place.set($event)"
        class="w-full rounded-md border border-neutral-300 px-3 py-2.5 outline-none focus:border-doctor"
      />
    </div>

    <div>
      <label for="type" class="block mb-1 font-medium text-neutral-700">Type</label>
      <select
        id="type"
        name="type"
        [ngModel]="type()"
        (ngModelChange)="type.set($event)"
        class="w-full rounded-md border border-neutral-300 px-3 py-2.5 outline-none focus:border-doctor bg-white"
      >
        <option value="OutReach">Outreach</option>
        <option value="InFacility">In-facility</option>
      </select>
    </div>

    @if (error()) {
      <p class="text-error">{{ error() }}</p>
    }

    <ds-button
      type="submit"
      label="Save activity"
      loadingLabel="Saving…"
      [loading]="saving()"
      [disabled]="!name() || !activityDate()"
    />
  </form>
</div>
